name: Build Mod
   on: [push]
   jobs:
     build:
       runs-on: ubuntu-latest
       steps:
         - uses: actions/checkout@v3
         - uses: actions/setup-java@v3
           with:
             java-version: '21'
             distribution: 'temurin'
         - name: Build
           run: cd autoclicker-mod && chmod +x gradlew && ./gradlew build
         - uses: actions/upload-artifact@v3
           with:
             name: autoclicker-mod
             path: autoclicker-mod/build/libs/*.jar
