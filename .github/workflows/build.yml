name: Build Mod
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build
        run: cd autoclicker-mod && chmod +x gradlew && ./gradlew build
      - uses: actions/upload-artifact@v4
        with:
          name: autoclicker-mod
          path: autoclicker-mod/build/libs/*.jar
